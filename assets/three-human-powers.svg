<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 1600 900" role="img" aria-labelledby="title desc">
  <title id="title">앞으로 더 중요해지는 세 가지 힘</title>
  <desc id="desc">AI 시대에 중요한 잘 읽는 힘, 좋은 질문을 하는 힘, 스스로 판단하는 힘을 정리한 인포그래픽</desc>
  <defs>
    <linearGradient id="bg" x1="0" y1="0" x2="1" y2="1">
      <stop offset="0" stop-color="#f4faf8"/>
      <stop offset="0.5" stop-color="#fffdf7"/>
      <stop offset="1" stop-color="#f1f5f8"/>
    </linearGradient>
    <linearGradient id="cardA" x1="0" y1="0" x2="1" y2="1">
      <stop offset="0" stop-color="#e2f5f2"/>
      <stop offset="1" stop-color="#ffffff"/>
    </linearGradient>
    <linearGradient id="cardB" x1="0" y1="0" x2="1" y2="1">
      <stop offset="0" stop-color="#fff0df"/>
      <stop offset="1" stop-color="#ffffff"/>
    </linearGradient>
    <linearGradient id="cardC" x1="0" y1="0" x2="1" y2="1">
      <stop offset="0" stop-color="#eef1fb"/>
      <stop offset="1" stop-color="#ffffff"/>
    </linearGradient>
    <filter id="shadow" x="-20%" y="-20%" width="140%" height="140%">
      <feDropShadow dx="0" dy="20" stdDeviation="20" flood-color="#172421" flood-opacity="0.13"/>
    </filter>
    <style>
      .title{font-family:-apple-system,BlinkMacSystemFont,"Apple SD Gothic Neo","Noto Sans KR","Segoe UI",sans-serif;font-size:64px;font-weight:850;fill:#172421}
      .subtitle{font-family:-apple-system,BlinkMacSystemFont,"Apple SD Gothic Neo","Noto Sans KR","Segoe UI",sans-serif;font-size:25px;font-weight:520;fill:#5d6b66}
      .num{font-family:-apple-system,BlinkMacSystemFont,"Segoe UI",sans-serif;font-size:34px;font-weight:850;fill:#fff}
      .cardTitle{font-family:-apple-system,BlinkMacSystemFont,"Apple SD Gothic Neo","Noto Sans KR","Segoe UI",sans-serif;font-size:43px;font-weight:850;fill:#172421}
      .cardSub{font-family:-apple-system,BlinkMacSystemFont,"Apple SD Gothic Neo","Noto Sans KR","Segoe UI",sans-serif;font-size:23px;font-weight:760;fill:#167f78}
      .body{font-family:-apple-system,BlinkMacSystemFont,"Apple SD Gothic Neo","Noto Sans KR","Segoe UI",sans-serif;font-size:24px;font-weight:560;fill:#3c4a46}
      .tag{font-family:-apple-system,BlinkMacSystemFont,"Apple SD Gothic Neo","Noto Sans KR","Segoe UI",sans-serif;font-size:19px;font-weight:760;fill:#172421}
      .small{font-family:-apple-system,BlinkMacSystemFont,"Apple SD Gothic Neo","Noto Sans KR","Segoe UI",sans-serif;font-size:19px;font-weight:560;fill:#6a7773}
      .line{stroke:#c7d5d1;stroke-width:3;stroke-linecap:round}
      .ink{stroke:#172421;stroke-width:6;stroke-linecap:round;stroke-linejoin:round;fill:none}
      .thin{stroke:#6f817b;stroke-width:4;stroke-linecap:round;stroke-linejoin:round;fill:none}
      .teal{stroke:#168b84;fill:none}
      .coral{stroke:#d76f5d;fill:none}
      .blue{stroke:#526da8;fill:none}
    </style>
  </defs>

  <rect width="1600" height="900" fill="url(#bg)"/>
  <circle cx="150" cy="132" r="112" fill="#168b84" opacity=".08"/>
  <circle cx="1440" cy="160" r="150" fill="#d76f5d" opacity=".08"/>
  <circle cx="808" cy="800" r="180" fill="#526da8" opacity=".07"/>

  <text x="800" y="92" text-anchor="middle" class="title">앞으로 더 중요해지는 세 가지 힘</text>
  <text x="800" y="136" text-anchor="middle" class="subtitle">AI가 답을 빠르게 만들수록, 사람에게 더 중요해지는 능력</text>

  <g opacity=".72">
    <path d="M512 467 L548 467" class="line"/>
    <path d="M1052 467 L1088 467" class="line"/>
    <circle cx="530" cy="467" r="8" fill="#9bb0aa"/>
    <circle cx="1070" cy="467" r="8" fill="#9bb0aa"/>
  </g>

  <!-- Card 1 -->
  <g transform="translate(92 205)" filter="url(#shadow)">
    <rect width="420" height="535" rx="28" fill="url(#cardA)" stroke="#c2dbd6" stroke-width="2"/>
    <circle cx="68" cy="68" r="36" fill="#168b84"/>
    <text x="68" y="80" text-anchor="middle" class="num">1</text>
    <g transform="translate(125 62)">
      <rect x="0" y="0" width="190" height="118" rx="14" fill="#fffdf8" stroke="#a9bbb6" stroke-width="4"/>
      <path d="M28 34 L154 34 M28 62 L170 62 M28 90 L120 90" class="thin"/>
      <rect x="28" y="50" width="122" height="14" rx="7" fill="#7fd6cf" opacity=".5"/>
      <circle cx="185" cy="108" r="36" fill="#eaf7f5" stroke="#168b84" stroke-width="4"/>
      <path d="M170 108 L181 119 L202 92" class="teal" stroke-width="7" stroke-linecap="round" stroke-linejoin="round"/>
    </g>
    <text x="210" y="245" text-anchor="middle" class="cardTitle">잘 읽는 힘</text>
    <text x="210" y="286" text-anchor="middle" class="cardSub">Reading Evidence</text>
    <text x="58" y="348" class="body">AI 답변, 논문, 표, 그림을</text>
    <text x="58" y="386" class="body">천천히 읽고 근거를 확인합니다.</text>
    <g transform="translate(58 438)">
      <rect width="304" height="42" rx="21" fill="#e7f5f2" stroke="#b8d6d0"/>
      <text x="152" y="28" text-anchor="middle" class="tag">“근거가 어디에 있지?”</text>
    </g>
  </g>

  <!-- Card 2 -->
  <g transform="translate(590 205)" filter="url(#shadow)">
    <rect width="420" height="535" rx="28" fill="url(#cardB)" stroke="#ead0b1" stroke-width="2"/>
    <circle cx="68" cy="68" r="36" fill="#d76f5d"/>
    <text x="68" y="80" text-anchor="middle" class="num">2</text>
    <g transform="translate(113 46)">
      <circle cx="90" cy="92" r="22" fill="#fff" stroke="#d76f5d" stroke-width="5"/>
      <circle cx="34" cy="150" r="15" fill="#fff" stroke="#f0a35f" stroke-width="5"/>
      <circle cx="172" cy="156" r="17" fill="#fff" stroke="#168b84" stroke-width="5"/>
      <circle cx="210" cy="74" r="14" fill="#fff" stroke="#526da8" stroke-width="5"/>
      <path d="M90 92 L34 150 M90 92 L172 156 M90 92 L210 74 M172 156 L210 74" stroke="#9da9a5" stroke-width="4" fill="none"/>
      <path d="M77 80 C83 60 110 60 116 80 C121 96 108 106 98 113 C91 118 88 126 89 135" class="coral" stroke-width="8"/>
      <circle cx="91" cy="159" r="8" fill="#d76f5d"/>
    </g>
    <text x="210" y="245" text-anchor="middle" class="cardTitle">좋은 질문을 하는 힘</text>
    <text x="210" y="286" text-anchor="middle" class="cardSub">Better Questions</text>
    <text x="58" y="348" class="body">목표, 조건, 맥락을 더해</text>
    <text x="58" y="386" class="body">AI가 일할 방향을 정합니다.</text>
    <g transform="translate(58 438)">
      <rect width="304" height="42" rx="21" fill="#fff3e5" stroke="#e7c294"/>
      <text x="152" y="28" text-anchor="middle" class="tag">“무엇을 더 물어야 하지?”</text>
    </g>
  </g>

  <!-- Card 3 -->
  <g transform="translate(1088 205)" filter="url(#shadow)">
    <rect width="420" height="535" rx="28" fill="url(#cardC)" stroke="#c9d2e8" stroke-width="2"/>
    <circle cx="68" cy="68" r="36" fill="#526da8"/>
    <text x="68" y="80" text-anchor="middle" class="num">3</text>
    <g transform="translate(122 44)">
      <path d="M90 28 L90 170" class="ink"/>
      <path d="M12 62 L168 62" class="ink"/>
      <path d="M42 62 L12 128 L72 128 Z" fill="#fff" stroke="#172421" stroke-width="5"/>
      <path d="M138 62 L108 128 L168 128 Z" fill="#fff" stroke="#172421" stroke-width="5"/>
      <path d="M50 128 C38 145 28 150 18 150 M130 128 C142 145 152 150 162 150" class="thin"/>
      <circle cx="42" cy="100" r="16" fill="#d76f5d" opacity=".6"/>
      <path d="M121 99 L136 114 L160 84" class="blue" stroke-width="7" stroke-linecap="round" stroke-linejoin="round"/>
      <path d="M45 184 L135 184" class="ink"/>
    </g>
    <text x="210" y="245" text-anchor="middle" class="cardTitle">스스로 판단하는 힘</text>
    <text x="210" y="286" text-anchor="middle" class="cardSub">Human Judgment</text>
    <text x="58" y="348" class="body">그럴듯한 답을 그대로 믿지 않고</text>
    <text x="58" y="386" class="body">책임 있게 선택하고 고칩니다.</text>
    <g transform="translate(58 438)">
      <rect width="304" height="42" rx="21" fill="#eef2fb" stroke="#c5cfea"/>
      <text x="152" y="28" text-anchor="middle" class="tag">“이 결론을 믿어도 되나?”</text>
    </g>
  </g>

  <g transform="translate(395 790)">
    <rect width="810" height="56" rx="28" fill="#ffffff" opacity=".82" stroke="#d4dedb"/>
    <text x="405" y="36" text-anchor="middle" class="small">AI는 속도를 높이고, 사람은 근거를 읽고 질문하고 판단합니다.</text>
  </g>
</svg>
